[tool:pytest]
testpaths = tests
filterwarnings =
    ignore::ResourceWarning
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:test_results/coverage_html

[coverage:run]
source = app
omit =
    app/desktop_control_center/*
    app/extensions/*
    */migrations/*

[coverage:report]
show_missing = true
skip_covered = false
fail_under = 70
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
