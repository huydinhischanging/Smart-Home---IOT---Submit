name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run backend unit tests
      working-directory: backend
      run: |
        pytest -q --cov=app --cov-report=term --maxfail=1

    - name: Check front-end format (optional)
      run: |
        echo "Frontend checks should be done by maintainers as needed."

  mobile:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Install mobile dependencies
      working-directory: MOBILE
      run: flutter pub get

    - name: Analyze mobile
      working-directory: MOBILE
      run: flutter analyze

    - name: Test mobile
      working-directory: MOBILE
      run: flutter test -r compact

    - name: Build Android dev APK
      working-directory: MOBILE
      run: |
        flutter build apk --flavor dev --debug \
          --dart-define=APP_ENV=dev \
          --dart-define=APP_BASE_URL=http://10.0.2.2:5000

    - name: Build Android prod APK
      working-directory: MOBILE
      run: |
        flutter build apk --flavor prod --release \
          --dart-define=APP_ENV=prod \
          --dart-define=APP_BASE_URL=https://example.com
