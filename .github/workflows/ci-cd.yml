name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # 1️⃣ BACKEND QUALITY CHECKS
  # ==========================================
  backend-quality:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pylint black pytest pytest-cov bandit
      
      - name: Run Black formatter check
        run: black --check backend/app
      
      - name: Run Pylint
        run: pylint --exit-zero backend/app --disable=all --enable=E,F
      
      - name: Run Bandit security scan
        run: bandit -r backend/app -f json -o bandit-report.json || true
      
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ==========================================
  # 2️⃣ BACKEND TESTS
  # ==========================================
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-quality
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: batman_os_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-mock
      
      - name: Run pytest with coverage
        env:
          FLASK_ENV: testing
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: test_root
          DB_NAME: batman_os_test
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
      
      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 75
          MINIMUM_ORANGE: 50

  # ==========================================
  # 3️⃣ FRONTEND QUALITY CHECKS
  # ==========================================
  frontend-quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Run ESLint
        run: |
          cd frontend
          npm install --save-dev eslint eslint-config-airbnb-base eslint-plugin-import
          npx eslint src/ --format=json --output-file eslint-report.json || true
      
      - name: Check for console.log in production
        run: |
          cd frontend
          if grep -r "console\\.log" src/ --include="*.js"; then
            echo "❌ Found console.log statements in code"
            exit 1
          fi
      
      - name: Check for hardcoded credentials
        run: |
          cd frontend
          if grep -r "password\|api_key\|secret" src/ --include="*.js" -i; then
            echo "⚠️  Potential hardcoded credentials found"
            exit 1
          fi
      
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: eslint-report
          path: frontend/eslint-report.json

  # ==========================================
  # 4️⃣ FRONTEND TESTS
  # ==========================================
  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-quality
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
          npm install --save-dev vitest @vitest/ui @testing-library/dom jsdom
      
      - name: Run tests
        run: |
          cd frontend
          npm run test:unit -- --coverage || true
      
      - name: Build for production
        run: |
          cd frontend
          npm run build

  # ==========================================
  # 5️⃣ DOCKER BUILD & PUSH
  # ==========================================
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max

  # ==========================================
  # 6️⃣ DEPLOYMENT (Dev/Staging)
  # ==========================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to dev environment
        env:
          DEPLOY_KEY: ${{ secrets.DEV_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /opt/batman-os
            git pull origin develop
            docker-compose -f docker-compose.dev.yml pull
            docker-compose -f docker-compose.dev.yml up -d
            docker-compose -f docker-compose.dev.yml exec backend python init_db.py
          EOF

  # ==========================================
  # 7️⃣ NOTIFICATIONS
  # ==========================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-test, frontend-quality, frontend-test]
    if: always()
    
    steps:
      - name: Determine workflow status
        id: status
        run: |
          if [[ "${{ needs.backend-quality.result }}" == "success" && \
                "${{ needs.backend-test.result }}" == "success" && \
                "${{ needs.frontend-quality.result }}" == "success" && \
                "${{ needs.frontend-test.result }}" == "success" ]]; then
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
            echo "color=00FF00" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "color=FF0000" >> $GITHUB_OUTPUT
          fi
      
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        if: github.event_name == 'push'
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "GitHub Action: ${{ steps.status.outputs.status }}",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "title": "CI/CD Pipeline Result",
                  "fields": [
                    {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                    {"title": "Branch", "value": "${{ github.ref }}", "short": true},
                    {"title": "Commit", "value": "${{ github.sha }}", "short": false},
                    {"title": "Author", "value": "${{ github.actor }}", "short": true}
                  ]
                }
              ]
            }
